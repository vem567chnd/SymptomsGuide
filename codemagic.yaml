workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      android_signing:
        - symptoms_guide_keystore     # name you'll create in Codemagic UI
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android App Bundle
        script: |
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=$(($(google-play get-latest-build-number \
              --package-name "com.globalgenius.symptomsguide" \
              --tracks=alpha) + 1))
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/mapping/release/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS   # set in Codemagic UI
        track: internal                                      # internal → alpha → beta → production
        submit_as_draft: true
