workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      android_signing:
        - symptoms_guide_keystore
      groups:
        - BuildCo
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Regenerate Android project
        script: |
          rm -rf android
          flutter create --project-name symptomsguide --org com.vem567 --platforms android .
      - name: Configure release signing
        script: |
          printf "storePassword=%s\n" "$CM_KEYSTORE_PASSWORD" > android/key.properties
          printf "keyPassword=%s\n" "$CM_KEY_PASSWORD" >> android/key.properties
          printf "keyAlias=%s\n" "$CM_KEY_ALIAS" >> android/key.properties
          printf "storeFile=%s\n" "$CM_KEYSTORE_PATH" >> android/key.properties
          echo "=== key.properties ==="
          cat android/key.properties
          python3 scripts/inject_signing.py
      - name: Build Android App Bundle
        script: |
          BUILD_NUMBER=$(($(google-play get-latest-build-number \
            --package-name "com.vem567.symptomsguide" \
            --tracks=internal 2>/dev/null || echo 0) + 1))
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/mapping/release/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
